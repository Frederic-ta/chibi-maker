<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Chibi Maker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Noto+Sans+JP&family=Pacifico&family=Permanent+Marker&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Chibi Maker</h1>
    </header>

    <section id="preview-area">
      <div id="chibi-preview">
        <svg id="chibi-svg" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div id="canvas-size-label" class="hidden">53mm</div>
    </section>

    <nav id="category-bar"></nav>

    <section id="options-area">
      <div id="options-carousel"></div>

      <!-- Text input panel (shown when Texte category active) -->
      <div id="text-panel" class="hidden">
        <input type="text" id="text-input" placeholder="Votre texte..." maxlength="30">
        <select id="font-select">
          <option value="sans-serif">Sans-serif</option>
          <option value="Pacifico">Pacifico</option>
          <option value="Permanent Marker">Permanent Marker</option>
          <option value="Press Start 2P">Press Start 2P</option>
          <option value="Noto Sans JP">Noto Sans JP</option>
          <option value="Dancing Script">Dancing Script</option>
        </select>
        <div id="font-size-row">
          <label for="font-size">Taille</label>
          <input type="range" id="font-size" min="6" max="32" value="14">
          <span id="font-size-val">14</span>
        </div>
        <button id="btn-add-text">Ajouter</button>
      </div>
    </section>

    <section id="actions-bar">
      <button id="btn-random" title="Aléatoire">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        <span>Aléatoire</span>
      </button>
      <button id="btn-save" title="Sauvegarder">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        <span>Sauvegarder</span>
      </button>
      <button id="btn-load" title="Charger">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        <span>Charger</span>
      </button>
      <button id="btn-export" title="Exporter PNG">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Exporter</span>
      </button>
      <button id="btn-canvas-size" title="Taille d'export">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        <span>53mm</span>
      </button>
    </section>
  </div>

  <!-- Modal for saved chibis -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <h2>Chibis sauvegardés</h2>
        <button id="modal-close">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="js/parts.js"></script>
  <script src="js/decorations.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/overlay.js"></script>
  <script src="js/exporter.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
