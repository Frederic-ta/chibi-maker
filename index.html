<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Chibi Maker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Noto+Sans+JP&family=Pacifico&family=Permanent+Marker&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- HEADER -->
    <header id="app-header">
      <h1>Chibi Maker</h1>
      <div id="header-actions">
        <button id="btn-random" title="Aléatoire">&#x1f504;</button>
        <div id="menu-wrapper">
          <button id="btn-menu" title="Menu">&#x22EE;</button>
          <div id="dropdown-menu" class="hidden">
            <button id="btn-save">Sauvegarder</button>
            <button id="btn-load">Charger</button>
            <div class="menu-divider"></div>
            <button id="btn-canvas-size">53mm</button>
          </div>
        </div>
      </div>
    </header>

    <!-- PREVIEW -->
    <section id="preview-area">
      <div id="chibi-preview">
        <svg id="chibi-svg" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div id="canvas-size-label" class="hidden">53mm</div>
    </section>

    <!-- EDITOR PANEL -->
    <section id="editor-panel">
      <nav id="category-tabs"></nav>
      <div id="options-grid-area">
        <div id="options-grid"></div>
        <div id="text-panel" class="hidden">
          <input type="text" id="text-input" placeholder="Votre texte..." maxlength="30">
          <select id="font-select">
            <option value="sans-serif">Sans-serif</option>
            <option value="Pacifico">Pacifico</option>
            <option value="Permanent Marker">Permanent Marker</option>
            <option value="Press Start 2P">Press Start 2P</option>
            <option value="Noto Sans JP">Noto Sans JP</option>
            <option value="Dancing Script">Dancing Script</option>
          </select>
          <div id="font-size-row">
            <label for="font-size">Taille</label>
            <input type="range" id="font-size" min="6" max="32" value="14">
            <span id="font-size-val">14</span>
          </div>
          <button id="btn-add-text">Ajouter</button>
        </div>
      </div>
    </section>

    <!-- EXPORT -->
    <button id="btn-export">Exporter PNG</button>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <h2>Chibis sauvegardes</h2>
        <button id="modal-close">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="js/parts.js"></script>
  <script src="js/decorations.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/overlay.js"></script>
  <script src="js/exporter.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
